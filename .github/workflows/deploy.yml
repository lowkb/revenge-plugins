name: Build and deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - name: Prepare environment
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - run: npm install -g pnpm

      - name: Install deps
        run: pnpm m i

      - name: Build plugin(s)
        run: node ./plugins/build.mjs

      - name: Copy additional files
        run: |
          cp README.md plugins/dist/README.md
          printf -- "---\npermalink: /404.html\n---\n" > plugins/dist/404.md
          printf -- "> **Note:** You accessed a link that returned a 404, probably by clicking one of the plugin links. You're supposed to copy the link address and add it into Vendetta.\n\n" >> plugins/dist/404.md
          cat README.md >> plugins/dist/404.md

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./plugins/dist
          enable_jekyll: true
